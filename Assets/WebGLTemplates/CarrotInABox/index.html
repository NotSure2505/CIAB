<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carrot in a Box</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg-deep:    #0d0905;
    --bg-mid:     #1a1108;
    --brown-dark: #2c1a0a;
    --brown-mid:  #5c3317;
    --amber:      #c97c2a;
    --gold:       #e8a838;
    --cream:      #f5e6c8;
    --carrot:     #e85d20;
    --carrot-tip: #4a8c2a;
    --glow:       rgba(232, 168, 56, 0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-deep);
    font-family: 'Crimson Pro', Georgia, serif;
    overflow: hidden;
    color: var(--cream);
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 100;
    opacity: 0.6;
  }

  /* ── Vignette ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    pointer-events: none; z-index: 99;
  }

  /* ── Floating dust particles ── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    animation: float-up var(--dur) var(--delay) infinite ease-in-out;
  }
  @keyframes float-up {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
  }

  /* ── Main layout ── */
  .scene {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  /* ── Candlelight ambient glow ── */
  .glow-orb {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,120,40,0.12) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse-glow 4s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%       { transform: scale(1.1); opacity: 0.7; }
  }

  /* ── Box illustration ── */
  .box-wrap {
    position: relative;
    width: 260px; height: 200px;
    margin-bottom: -10px;
    animation: box-float 6s ease-in-out infinite;
    opacity: 0;
    animation: box-float 6s ease-in-out infinite, fade-in-up 1.2s 0.3s forwards ease-out;
  }
  @keyframes box-float {
    0%, 100% { transform: translateY(0px)   rotate(-1deg); }
    50%       { transform: translateY(-12px) rotate(1deg);  }
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .box-svg { width: 100%; height: 100%; filter: drop-shadow(0 20px 40px rgba(200,120,40,0.3)); }

  /* carrot peek animation */
  .carrot-peek {
    animation: carrot-bob 3s 2s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes carrot-bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  /* ── Title ── */
  .title-wrap {
    text-align: center;
    opacity: 0;
    animation: fade-in-up 1s 0.7s forwards ease-out;
  }

  .eyebrow {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.85rem, 2vw, 1rem);
    letter-spacing: 0.35em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900;
    font-size: clamp(3.5rem, 9vw, 6.5rem);
    line-height: 0.9;
    color: var(--cream);
    text-shadow:
      0 0 60px rgba(232,168,56,0.4),
      0 0 120px rgba(232,168,56,0.15),
      2px 2px 0px rgba(0,0,0,0.8);
    letter-spacing: -0.02em;
  }

  .title .carrot-word {
    color: var(--carrot);
    font-style: italic;
    display: inline-block;
    text-shadow:
      0 0 40px rgba(232,93,32,0.6),
      0 0 80px rgba(232,93,32,0.2),
      2px 2px 0px rgba(0,0,0,0.8);
    animation: carrot-shimmer 3s ease-in-out infinite;
  }
  @keyframes carrot-shimmer {
    0%, 100% { text-shadow: 0 0 40px rgba(232,93,32,0.6), 0 0 80px rgba(232,93,32,0.2), 2px 2px 0px rgba(0,0,0,0.8); }
    50%       { text-shadow: 0 0 60px rgba(232,93,32,0.9), 0 0 120px rgba(232,93,32,0.4), 2px 2px 0px rgba(0,0,0,0.8); }
  }

  .subtitle {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: rgba(245,230,200,0.55);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 28px 0 24px;
    opacity: 0;
    animation: fade-in 1s 1s forwards;
  }
  .divider-line {
    flex: 1; max-width: 80px; height: 1px;
    background: linear-gradient(to right, transparent, var(--amber));
  }
  .divider-line.right { background: linear-gradient(to left, transparent, var(--amber)); }
  .divider-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 12px var(--amber);
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* ── Auth panel ── */
  .auth-panel {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    opacity: 0;
    animation: fade-in-up 1s 1.1s forwards ease-out;
    width: 100%; max-width: 360px;
  }

  /* ── Login button ── */
  .btn-login {
    position: relative;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%;
    padding: 16px 32px;
    background: linear-gradient(135deg, var(--brown-mid) 0%, #7a4420 50%, var(--brown-mid) 100%);
    border: 1px solid var(--amber);
    border-radius: 4px;
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(200,120,40,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    text-decoration: none;
  }
  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,120,40,0.4), inset 0 1px 0 rgba(255,255,255,0.12); }
  .btn-login:hover::before { opacity: 1; }
  .btn-login:active { transform: translateY(0); }

  .btn-login .itch-logo {
    width: 22px; height: 22px; flex-shrink: 0;
    filter: brightness(1.3);
  }

  /* shimmer sweep */
  .btn-login::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    animation: shimmer 3s 2s infinite;
  }
  @keyframes shimmer {
    0%   { left: -100%; }
    100% { left: 200%; }
  }

  /* ── Status / loading states ── */
  .status-text {
    font-style: italic;
    font-size: 0.95rem;
    color: rgba(245,230,200,0.5);
    height: 20px;
    text-align: center;
    transition: color 0.3s;
  }
  .status-text.error   { color: #e85d5d; }
  .status-text.success { color: #7ec87e; }
  .status-text.loading { color: var(--amber); }

  /* loading dots */
  .dots::after {
    content: '';
    animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%   { content: '.';   }
    33%  { content: '..';  }
    66%  { content: '...'; }
  }

  /* ── Logged-in state ── */
  .logged-in-panel {
    display: none;
    flex-direction: column; align-items: center; gap: 16px;
    width: 100%; max-width: 360px;
    opacity: 0;
    animation: fade-in-up 0.6s forwards ease-out;
  }
  .logged-in-panel.visible { display: flex; }

  .player-badge {
    display: flex; align-items: center; gap: 12px;
    background: rgba(92,51,23,0.3);
    border: 1px solid rgba(232,168,56,0.3);
    border-radius: 4px;
    padding: 12px 20px;
    width: 100%;
  }
  .player-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--carrot), var(--amber));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 900;
    color: var(--bg-deep);
    flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }
  .player-info { flex: 1; }
  .player-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700;
    color: var(--cream);
  }
  .player-meta {
    font-size: 0.8rem; color: rgba(245,230,200,0.45);
    font-style: italic;
  }

  .btn-play {
    width: 100%;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--carrot) 0%, #c04a10 100%);
    border: none; border-radius: 4px;
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem; font-weight: 900;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(232,93,32,0.4);
    position: relative; overflow: hidden;
  }
  .btn-play::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }
  .btn-play:hover { transform: translateY(-3px); box-shadow: 0 10px 40px rgba(232,93,32,0.6); }
  .btn-play:active { transform: translateY(0); }

  .btn-logout {
    background: none; border: none;
    color: rgba(245,230,200,0.35);
    font-family: 'Crimson Pro', serif;
    font-style: italic; font-size: 0.85rem;
    cursor: pointer; transition: color 0.2s;
    text-decoration: underline; text-underline-offset: 3px;
  }
  .btn-logout:hover { color: rgba(245,230,200,0.7); }

  /* ── Footer ── */
  .footer {
    position: fixed; bottom: 24px;
    font-size: 0.75rem;
    color: rgba(245,230,200,0.2);
    font-style: italic;
    letter-spacing: 0.1em;
    z-index: 10;
    animation: fade-in 1s 1.5s both;
  }

  /* ── Responsive ── */
  @media (max-height: 600px) {
    .box-wrap { width: 160px; height: 120px; margin-bottom: 0; }
    .title { font-size: 3rem; }
  }
</style>
</head>
<body>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Ambient glow -->
<div class="glow-orb"></div>

<div class="scene">

  <!-- Box illustration -->
  <div class="box-wrap">
    <svg class="box-svg" viewBox="0 0 260 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Box shadow -->
      <ellipse cx="130" cy="195" rx="80" ry="8" fill="rgba(0,0,0,0.5)"/>

      <!-- Box body -->
      <rect x="30" y="90" width="200" height="105" rx="3"
            fill="#3d1f0a" stroke="#7a4420" stroke-width="1.5"/>
      <!-- Box body shading -->
      <rect x="30" y="90" width="200" height="105" rx="3"
            fill="url(#boxGrad)"/>
      <!-- Box wood grain lines -->
      <line x1="60" y1="90" x2="60" y2="195" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
      <line x1="100" y1="90" x2="100" y2="195" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
      <line x1="160" y1="90" x2="160" y2="195" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
      <line x1="200" y1="90" x2="200" y2="195" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>

      <!-- Box lid -->
      <rect x="22" y="75" width="216" height="22" rx="3"
            fill="#4f2a0e" stroke="#8a5028" stroke-width="1.5"/>
      <rect x="22" y="75" width="216" height="22" rx="3"
            fill="url(#lidGrad)"/>

      <!-- Lid hinge detail -->
      <rect x="115" y="73" width="30" height="6" rx="2"
            fill="#6b3818" stroke="#9a6030" stroke-width="1"/>

      <!-- Carrot peeking out -->
      <g class="carrot-peek">
        <!-- carrot body -->
        <path d="M118 30 Q130 20 142 30 L138 80 Q130 85 122 80 Z"
              fill="#e85d20"/>
        <!-- carrot shading -->
        <path d="M118 30 Q122 22 128 24 L124 78 Q120 80 118 75 Z"
              fill="rgba(255,255,255,0.12)"/>
        <path d="M136 30 Q140 25 142 30 L140 75 Q137 80 135 78 Z"
              fill="rgba(0,0,0,0.15)"/>
        <!-- carrot rings -->
        <path d="M122 45 Q130 48 138 45" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" fill="none"/>
        <path d="M121 58 Q130 61 139 58" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" fill="none"/>
        <path d="M122 70 Q130 73 138 70" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" fill="none"/>
        <!-- carrot top greens -->
        <path d="M128 30 C122 10 110 2 108 -5" stroke="#4a8c2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M130 28 C130 8 128 0 132 -8" stroke="#5aaa32" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M132 30 C138 12 148 4 150 -3" stroke="#4a8c2a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M129 29 C126 15 120 10 118 5" stroke="#5aaa32" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>

      <!-- Box front label -->
      <rect x="75" y="118" width="110" height="52" rx="2"
            fill="rgba(245,210,160,0.07)" stroke="rgba(245,210,160,0.15)" stroke-width="1"/>
      <text x="130" y="140" text-anchor="middle"
            fill="rgba(245,210,160,0.4)" font-size="9"
            font-family="Georgia, serif" font-style="italic" letter-spacing="2">CONTENTS</text>
      <text x="130" y="156" text-anchor="middle"
            fill="rgba(245,210,160,0.25)" font-size="8"
            font-family="Georgia, serif" letter-spacing="1">UNKNOWN</text>

      <!-- Corner nail details -->
      <circle cx="38" cy="97" r="3" fill="#6b3818" stroke="#9a6030" stroke-width="0.5"/>
      <circle cx="222" cy="97" r="3" fill="#6b3818" stroke="#9a6030" stroke-width="0.5"/>
      <circle cx="38" cy="188" r="3" fill="#6b3818" stroke="#9a6030" stroke-width="0.5"/>
      <circle cx="222" cy="188" r="3" fill="#6b3818" stroke="#9a6030" stroke-width="0.5"/>

      <defs>
        <linearGradient id="boxGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
        </linearGradient>
        <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.2)"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Title -->
  <div class="title-wrap">
    <p class="eyebrow">A game of deception &amp; chance</p>
    <h1 class="title">
      <span class="carrot-word">Carrot</span><br>in a Box
    </h1>
    <p class="subtitle">Who has the carrot? Only one way to find out.</p>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line right"></div>
  </div>

  <!-- Auth Panel (shown when not logged in) -->
  <div class="auth-panel" id="authPanel">
    <button class="btn-login" id="loginBtn" onclick="startLogin()">
      <!-- itch.io logo SVG -->
      <svg class="itch-logo" viewBox="0 0 245.371 220.736" xmlns="http://www.w3.org/2000/svg">
        <path d="M31.99 1.365C21.287 7.72.2 31.945 0 38.298v10.516C0 62.144 12.46 73.86 23.773 73.86c13.584 0 24.902-11.259 24.902-24.82 0 13.561 10.97 24.82 24.553 24.82 13.584 0 24.208-11.259 24.208-24.82 0 13.561 11.32 24.82 24.903 24.82h.28c13.583 0 24.903-11.259 24.903-24.82 0 13.561 10.624 24.82 24.208 24.82 13.583 0 24.553-11.259 24.553-24.82 0 13.561 11.317 24.82 24.9 24.82 11.314 0 23.773-11.716 23.773-25.046V38.298c-.2-6.353-21.287-30.578-32-36.933C176.118-.59 68.67-.485 31.99 1.365zm80.986 ranking..." fill="white"/>
        <path d="M31.99 1.365C21.287 7.72.2 31.945 0 38.298v10.516C0 62.144 12.46 73.86 23.773 73.86c13.584 0 24.902-11.259 24.902-24.82 0 13.561 10.97 24.82 24.553 24.82 13.584 0 24.208-11.259 24.208-24.82 0 13.561 11.32 24.82 24.903 24.82h.28c13.583 0 24.903-11.259 24.903-24.82 0 13.561 10.624 24.82 24.208 24.82 13.583 0 24.553-11.259 24.553-24.82 0 13.561 11.317 24.82 24.9 24.82 11.314 0 23.773-11.716 23.773-25.046V38.298c-.2-6.353-21.287-30.578-32-36.933C176.118-.59 68.67-.485 31.99 1.365z" fill="none"/>
      </svg>
      Login with itch.io to Play
    </button>
    <p class="status-text" id="statusText">Sign in to join the game</p>
  </div>

  <!-- Logged-in Panel (shown after auth) -->
  <div class="logged-in-panel" id="loggedInPanel">
    <div class="player-badge">
      <div class="player-avatar" id="playerInitial">?</div>
      <div class="player-info">
        <div class="player-name" id="playerName">Loading...</div>
        <div class="player-meta" id="playerMeta">itch.io • authenticated</div>
      </div>
    </div>
    <button class="btn-play" onclick="enterLobby()">
      🥕 &nbsp; Enter the Lobby
    </button>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>

</div>

<p class="footer">© 2026 NotSure2505 &nbsp;·&nbsp; Built on itch.io</p>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const SERVER = 'https://sea-turtle-app-k7m7l.ondigitalocean.app';

  // ── Particles ────────────────────────────────────────────────────────────────
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      --dur: ${8 + Math.random() * 14}s;
      --delay: ${Math.random() * 12}s;
      --drift: ${(Math.random() - 0.5) * 120}px;
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
      opacity: 0;
    `;
    container.appendChild(p);
  }

  // ── State ────────────────────────────────────────────────────────────────────
  let currentPlayer = null;
  let pollInterval  = null;

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const authPanel      = document.getElementById('authPanel');
  const loggedInPanel  = document.getElementById('loggedInPanel');
  const loginBtn       = document.getElementById('loginBtn');
  const statusText     = document.getElementById('statusText');
  const playerName     = document.getElementById('playerName');
  const playerInitial  = document.getElementById('playerInitial');
  const playerMeta     = document.getElementById('playerMeta');

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function setStatus(msg, type = '') {
    statusText.textContent = msg;
    statusText.className = 'status-text ' + type;
  }

  function showLoggedIn(player) {
    currentPlayer = player;
    playerName.textContent = player.displayName || player.itchUsername;
    playerInitial.textContent = (player.displayName || player.itchUsername || '?')[0].toUpperCase();
    const wins = player.wins || 0;
    const games = player.gamesPlayed || 0;
    playerMeta.textContent = games > 0
      ? `${wins}W / ${games}G · ${Math.round(wins/games*100)}% win rate`
      : 'itch.io · authenticated';
    authPanel.style.display = 'none';
    loggedInPanel.classList.add('visible');
  }

  function showLoginPanel(msg = 'Sign in to join the game') {
    loggedInPanel.classList.remove('visible');
    authPanel.style.display = 'flex';
    loginBtn.disabled = false;
    setStatus(msg);
  }

  // ── Check saved token on load ────────────────────────────────────────────────
  async function checkSavedToken() {
    const token = localStorage.getItem('ciab_token');
    if (!token) return;
    setStatus('Restoring session...', 'loading');
    try {
      const res = await fetch(`${SERVER}/auth/validate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      if (data.success) {
        showLoggedIn(data);
      } else {
        localStorage.removeItem('ciab_token');
        showLoginPanel();
      }
    } catch {
      showLoginPanel();
    }
  }

  // ── Login flow ────────────────────────────────────────────────────────────────
  async function startLogin() {
    loginBtn.disabled = true;
    setStatus('Opening itch.io...', 'loading');
    statusText.classList.add('dots');

    try {
      const res  = await fetch(`${SERVER}/auth/login`);
      const data = await res.json();

      // Open auth window
      const popup = window.open(data.authUrl, 'itchio_auth', 'width=620,height=720');

      if (!popup) {
        // Popup blocked — open in same tab
        window.location.href = data.authUrl;
        return;
      }

      setStatus('Waiting for itch.io login', 'loading');

      // Poll for completion
      let attempts = 0;
      pollInterval = setInterval(async () => {
        attempts++;
        if (attempts > 60) { // 2 min timeout
          clearInterval(pollInterval);
          showLoginPanel('Login timed out. Please try again.');
          return;
        }
        try {
          const pollRes  = await fetch(`${SERVER}/auth/poll`, { credentials: 'include' });
          const pollData = await pollRes.json();
          if (pollData.ready && pollData.token) {
            clearInterval(pollInterval);
            await validateToken(pollData.token);
          }
        } catch {}
      }, 2000);

      // Also listen for postMessage from success page
      window.addEventListener('message', async (e) => {
        try {
          const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
          if (msg?.type === 'AUTH_SUCCESS' && msg.token) {
            clearInterval(pollInterval);
            await validateToken(msg.token);
          }
        } catch {}
      }, { once: true });

    } catch (err) {
      showLoginPanel('Could not reach server. Please try again.');
    }
  }

  async function validateToken(token) {
    statusText.classList.remove('dots');
    setStatus('Authenticating...', 'loading');
    try {
      const res  = await fetch(`${SERVER}/auth/validate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('ciab_token', token);
        setStatus('Welcome back!', 'success');
        setTimeout(() => showLoggedIn(data), 600);
      } else {
        showLoginPanel(data.error || 'Login failed. Please try again.');
      }
    } catch {
      showLoginPanel('Connection error. Please try again.');
    }
  }

  // ── Unity WebGL Loader ───────────────────────────────────────────────────────
  function enterLobby() {
    const token  = localStorage.getItem('ciab_token');
    const player = currentPlayer;
    // Fade out title screen
    document.querySelector('.scene').style.transition = 'opacity 0.8s';
    document.querySelector('.scene').style.opacity    = '0';
    document.querySelector('.glow-orb').style.opacity = '0';
    setTimeout(() => {
      document.querySelector('.scene').style.display = 'none';
      loadUnity(token, player);
    }, 800);
  }

  function loadUnity(token, player) {
    const container    = document.getElementById('unity-container');
    const canvas       = document.getElementById('unity-canvas');
    const loadingBar   = document.getElementById('unity-loading-bar');
    const progressFill = document.getElementById('unity-progress-fill');
    const loadingName  = document.getElementById('unity-loading-name');

    container.style.display = 'flex';
    loadingName.textContent = `Welcome, ${player.displayName} 🥕`;

    // Build files generated by Unity WebGL build
    const buildUrl  = 'Build';
    const loaderUrl = buildUrl + '/{{{ LOADER_FILENAME }}}';
    const config = {
      dataUrl:            buildUrl + '/{{{ DATA_FILENAME }}}',
      frameworkUrl:       buildUrl + '/{{{ FRAMEWORK_FILENAME }}}',
      codeUrl:            buildUrl + '/{{{ CODE_FILENAME }}}',
      streamingAssetsUrl: 'StreamingAssets',
      companyName:        'NotSure2505',
      productName:        'CarrotInABox',
      productVersion:     '1.0',
    };

    const script   = document.createElement('script');
    script.src     = loaderUrl;
    script.onload  = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressFill.style.width = (progress * 100) + '%';
      }).then((unityInstance) => {
        loadingBar.style.display = 'none';
        canvas.style.display     = 'block';
        // Send auth token to Unity C# ItchOAuthManager
        unityInstance.SendMessage(
          'GameManager',
          'HandleWebGLAuthMessage',
          JSON.stringify({ type: 'AUTH_SUCCESS', token: token })
        );
      }).catch((err) => {
        console.error('Unity failed to load:', err);
        loadingName.textContent = 'Failed to load. Please refresh.';
      });
    };
    document.body.appendChild(script);
  }

  async function logout() {
    try {
      await fetch(`${SERVER}/auth/logout`, { method: 'POST', credentials: 'include' });
    } catch {}
    localStorage.removeItem('ciab_token');
    currentPlayer = null;
    showLoginPanel('You have been signed out.');
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    checkSavedToken();
  });
</script>

  <div id="unity-loading-bar" style="text-align:center;">
    <p style="font-family:'Crimson Pro',serif; font-style:italic; font-size:1.3rem; color:#e8a838; margin-bottom:20px;" id="unity-loading-name">Loading...</p>
    <div style="width:300px; height:4px; background:rgba(92,51,23,0.4); border-radius:2px; overflow:hidden; border:1px solid rgba(232,168,56,0.2);">
      <div id="unity-progress-fill" style="height:100%; width:0%; background:linear-gradient(90deg,#c97c2a,#e8a838); transition:width 0.3s; border-radius:2px;"></div>
    </div>
    <p style="font-family:'Crimson Pro',serif; font-style:italic; font-size:0.85rem; color:rgba(245,230,200,0.3); margin-top:12px;">🥕 Preparing the boxes...</p>
  </div>
  <!-- Unity renders here -->
  <canvas id="unity-canvas" style="display:none; width:100%; height:100%;"></canvas>
</div>
